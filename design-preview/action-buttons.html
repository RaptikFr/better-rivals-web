<!DOCTYPE html>
<!-- @dsCard group="Components" name="TargetButton + ChallengeButton" subtitle="Objectif (pink) & Défi (violet), états + variante compacte" -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boutons d'action — aperçu</title>
<style>
  :root { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px; background: #fafafa; color: #171717; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #737373; font-size: 13px; margin: 0 0 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 760px; }
  .panel { border-radius: 12px; padding: 24px; border: 1px solid; }
  .panel.light { background: #ffffff; border-color: #e5e5e5; }
  .panel.dark  { background: #0a0a0a; border-color: #262626; color: #fafafa; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; opacity: .6; margin: 0 0 16px; font-weight: 600; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .cap { font-size: 11px; opacity: .5; width: 100%; margin-bottom: 4px; }
  .btn { padding: 6px 12px; border-radius: 9999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; cursor: default; }
  /* neutres (inactif) */
  .light .neutral { background: #e5e5e5; border-color: #d4d4d4; color: #404040; }
  .dark  .neutral { background: #262626; border-color: #404040; color: #d4d4d4; }
  /* objectif actif (pink) */
  .target-on { background: rgba(236,72,153,.15); border-color: rgba(236,72,153,.40); color: #f472b6; }
  /* défi envoyé (violet) */
  .duel-on { background: rgba(139,92,246,.15); border-color: rgba(139,92,246,.40); color: #a78bfa; }
  .emoji { font-size: 16px; cursor: default; }
  .emoji.muted { opacity: .5; }
  .pink { color: #f472b6; } .violet { color: #a78bfa; }
</style>
</head>
<body>
  <h1>TargetButton + ChallengeButton</h1>
  <p class="sub">Aperçu local — depuis <code>TargetButton.tsx</code> / <code>ChallengeButton.tsx</code>. À placer côte à côte sur une config.</p>
  <div class="grid">
    <div class="panel light">
      <h2>Thème clair</h2>
      <div class="row"><span class="cap">Pleins — inactifs</span>
        <button class="btn neutral">🎯 Battre ce temps</button>
        <button class="btn neutral">⚔️ Défier</button></div>
      <div class="row"><span class="cap">Pleins — actifs</span>
        <button class="btn target-on">✓ Objectif</button>
        <button class="btn duel-on">✓ Défi envoyé</button></div>
      <div class="row"><span class="cap">Compacts (icônes)</span>
        <span class="emoji muted">🎯</span><span class="emoji pink">🎯</span>
        <span class="emoji muted">⚔️</span><span class="emoji violet">⚔️</span></div>
    </div>
    <div class="panel dark">
      <h2>Thème sombre</h2>
      <div class="row"><span class="cap">Pleins — inactifs</span>
        <button class="btn neutral">🎯 Battre ce temps</button>
        <button class="btn neutral">⚔️ Défier</button></div>
      <div class="row"><span class="cap">Pleins — actifs</span>
        <button class="btn target-on">✓ Objectif</button>
        <button class="btn duel-on">✓ Défi envoyé</button></div>
      <div class="row"><span class="cap">Compacts (icônes)</span>
        <span class="emoji muted">🎯</span><span class="emoji pink">🎯</span>
        <span class="emoji muted">⚔️</span><span class="emoji violet">⚔️</span></div>
    </div>
  </div>
</body>
</html>
