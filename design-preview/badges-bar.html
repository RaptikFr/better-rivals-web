<!DOCTYPE html>
<!-- @dsCard group="Components" name="BadgesBar" subtitle="Pastilles par ton (gold/violet/pink/neutral), état déplié" -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BadgesBar — aperçu</title>
<style>
  :root { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px; background: #fafafa; color: #171717; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #737373; font-size: 13px; margin: 0 0 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 760px; }
  .panel { border-radius: 12px; padding: 24px; border: 1px solid; }
  .panel.light { background: #ffffff; border-color: #e5e5e5; }
  .panel.dark  { background: #0a0a0a; border-color: #262626; color: #fafafa; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; opacity: .6; margin: 0 0 16px; font-weight: 600; }
  .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; background: none; border: none; cursor: pointer; padding: 0; }
  .light .toggle { color: #525252; }
  .dark .toggle { color: #a3a3a3; }
  .chev { width: 14px; height: 14px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding: 0; list-style: none; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; border: 1px solid; font-size: 12px; font-weight: 600; }
  .gold { border-color: rgba(251,191,36,.40); background: rgba(251,191,36,.10); }
  .light .gold { color: #d97706; } .dark .gold { color: #fcd34d; }
  .violet { border-color: rgba(167,139,250,.40); background: rgba(167,139,250,.10); }
  .light .violet { color: #7c3aed; } .dark .violet { color: #c4b5fd; }
  .pink { border-color: rgba(244,114,182,.40); background: rgba(244,114,182,.10); }
  .light .pink { color: #db2777; } .dark .pink { color: #f9a8d4; }
  .neutral { background: rgba(229,229,229,.40); }
  .light .neutral { border-color: #d4d4d4; color: #525252; }
  .dark .neutral { border-color: #404040; background: rgba(38,38,38,.40); color: #d4d4d4; }
</style>
</head>
<body>
  <h1>BadgesBar</h1>
  <p class="sub">Aperçu local — depuis <code>components/BadgesBar.tsx</code>. Affiché ici en état « déplié ».</p>
  <div class="grid">
    <div class="panel light">
      <h2>Thème clair</h2>
      <button class="toggle">🏅 Badges (4)
        <svg class="chev" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="transform:rotate(180deg)"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <ul class="pills">
        <li class="pill gold">🥇 Champion</li>
        <li class="pill violet">💎 Vétéran</li>
        <li class="pill pink">🔥 En feu</li>
        <li class="pill neutral">🚗 Pilote</li>
      </ul>
    </div>
    <div class="panel dark">
      <h2>Thème sombre</h2>
      <button class="toggle">🏅 Badges (4)
        <svg class="chev" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="transform:rotate(180deg)"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <ul class="pills">
        <li class="pill gold">🥇 Champion</li>
        <li class="pill violet">💎 Vétéran</li>
        <li class="pill pink">🔥 En feu</li>
        <li class="pill neutral">🚗 Pilote</li>
      </ul>
    </div>
  </div>
</body>
</html>
