<!DOCTYPE html>
<!-- @dsCard group="Components" name="FollowButton" subtitle="États Suivre / Suivi / désactivé, thème clair & sombre" -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FollowButton — aperçu</title>
<style>
  :root { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px; background: #fafafa; color: #171717; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #737373; font-size: 13px; margin: 0 0 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 680px; }
  .panel { border-radius: 12px; padding: 24px; border: 1px solid; }
  .panel.light { background: #ffffff; border-color: #e5e5e5; }
  .panel.dark  { background: #0a0a0a; border-color: #262626; color: #fafafa; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; opacity: .6; margin: 0 0 16px; font-weight: 600; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .cap { font-size: 11px; opacity: .5; width: 100%; margin-bottom: 4px; }
  .btn { padding: 8px 16px; border-radius: 9999px; font-size: 14px; font-weight: 700; border: 1px solid transparent; cursor: default; }
  /* + Suivre : dégradé pink → violet */
  .follow { color: #fff; background: linear-gradient(to right, #ec4899, #7c3aed); }
  /* ✓ Suivi : neutre */
  .light .followed { background: #e5e5e5; color: #404040; border-color: #d4d4d4; }
  .dark  .followed { background: #262626; color: #d4d4d4; border-color: #404040; }
  .disabled { opacity: .5; }
</style>
</head>
<body>
  <h1>FollowButton</h1>
  <p class="sub">Aperçu local — depuis <code>components/FollowButton.tsx</code>.</p>
  <div class="grid">
    <div class="panel light">
      <h2>Thème clair</h2>
      <div class="row"><span class="cap">Non suivi</span><button class="btn follow">+ Suivre</button></div>
      <div class="row"><span class="cap">Suivi</span><button class="btn followed">✓ Suivi</button></div>
      <div class="row"><span class="cap">En cours (désactivé)</span><button class="btn follow disabled">+ Suivre</button></div>
    </div>
    <div class="panel dark">
      <h2>Thème sombre</h2>
      <div class="row"><span class="cap">Non suivi</span><button class="btn follow">+ Suivre</button></div>
      <div class="row"><span class="cap">Suivi</span><button class="btn followed">✓ Suivi</button></div>
      <div class="row"><span class="cap">En cours (désactivé)</span><button class="btn follow disabled">+ Suivre</button></div>
    </div>
  </div>
</body>
</html>
